<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">PPMC</title>
  <desc id="desc">Logo PPMC avec oeil, initiale C et eclair jaune.</desc>
  <defs>
    <linearGradient id="ppmc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34106E"/>
      <stop offset="1" stop-color="#22064F"/>
    </linearGradient>
    <linearGradient id="ppmc-bolt" x1="280" y1="116" x2="212" y2="454" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE06A"/>
      <stop offset="0.42" stop-color="#FFC400"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
    <filter id="ppmc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#120027" flood-opacity=".32"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="42" fill="url(#ppmc-bg)"/>

  <g filter="url(#ppmc-shadow)">
    <path
      d="M44 256C128 126 258 87 381 154c39 21 70 54 93 102-23 48-54 81-93 102-123 67-253 28-337-102Z"
      fill="none"
      stroke="#fff"
      stroke-width="30"
      stroke-linejoin="round"
      stroke-linecap="round"
    />

    <path
      d="M305 168a111 111 0 1 0-34 187"
      fill="none"
      stroke="#fff"
      stroke-width="58"
      stroke-linecap="butt"
    />

    <path
      d="M287 176 374 112 335 240 414 220 232 452 279 282 223 294Z"
      fill="url(#ppmc-bolt)"
      stroke="#F4B000"
      stroke-width="6"
      stroke-linejoin="round"
    />
  </g>
</svg>
